<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteKeeper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .note-item.active { border-left-color: #3b82f6; background-color: #eff6ff; }
        .dark .note-item.active { background-color: #1e3a8a; }
        textarea:focus { outline: none; }
    </style>
</head>
<body class="bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-50 dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 flex flex-col">
            <!-- Header -->
            <div class="p-4 border-b border-slate-200 dark:border-slate-700">
                <h1 class="text-xl font-semibold mb-3">NoteKeeper</h1>
                <button id="newNoteBtn" class="w-full bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg flex items-center justify-center gap-2 transition-colors">
                    <i data-lucide="plus-circle" class="w-4 h-4"></i>
                    New Note
                </button>
            </div>
            
            <!-- Notes List -->
            <div id="notesList" class="flex-1 overflow-y-auto p-2 space-y-1">
                <!-- Notes will be rendered here -->
            </div>
        </aside>

        <!-- Main Editor -->
        <main class="flex-1 flex flex-col">
            <!-- Editor Header -->
            <div id="editorHeader" class="hidden border-b border-slate-200 dark:border-slate-700 p-4 flex justify-between items-center">
                <div>
                    <h2 id="noteTitle" class="text-lg font-medium"></h2>
                    <p id="noteDate" class="text-sm text-slate-500 dark:text-slate-400"></p>
                </div>
                <button id="deleteNoteBtn" class="text-red-500 hover:text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 p-2 rounded-lg transition-colors">
                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                </button>
            </div>

            <!-- Editor Content -->
            <div class="flex-1 flex flex-col">
                <!-- Empty State -->
                <div id="emptyState" class="flex-1 flex items-center justify-center text-slate-400">
                    <div class="text-center">
                        <i data-lucide="file-text" class="w-16 h-16 mx-auto mb-4 opacity-50"></i>
                        <p class="text-lg">No notes yet</p>
                        <p class="text-sm">Click "New Note" to get started</p>
                    </div>
                </div>

                <!-- Textarea -->
                <textarea id="noteContent" class="hidden flex-1 p-6 resize-none bg-transparent text-base leading-relaxed" placeholder="Start typing your note..."></textarea>
            </div>
        </main>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white dark:bg-slate-800 rounded-xl p-6 max-w-md w-full mx-4 shadow-2xl">
            <h3 class="text-lg font-semibold mb-2">Delete Note?</h3>
            <p class="text-slate-600 dark:text-slate-400 mb-6">This action cannot be undone. The note will be permanently deleted.</p>
            <div class="flex gap-3 justify-end">
                <button id="cancelDeleteBtn" class="px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
                    Cancel
                </button>
                <button id="confirmDeleteBtn" class="px-4 py-2 rounded-lg bg-red-500 hover:bg-red-600 text-white transition-colors">
                    Delete
                </button>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // State
        let notes = [];
        let currentNoteId = null;
        let saveTimeout = null;

        // DOM Elements
        const notesList = document.getElementById('notesList');
        const newNoteBtn = document.getElementById('newNoteBtn');
        const editorHeader = document.getElementById('editorHeader');
        const noteTitle = document.getElementById('noteTitle');
        const noteDate = document.getElementById('noteDate');
        const deleteNoteBtn = document.getElementById('deleteNoteBtn');
        const emptyState = document.getElementById('emptyState');
        const noteContent = document.getElementById('noteContent');
        const deleteModal = document.getElementById('deleteModal');
        const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
        const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');

        // Storage functions
        function getNotes() {
            const stored = localStorage.getItem('notekeeper_notes');
            return stored ? JSON.parse(stored) : [];
        }

        function saveNotes(notesToSave) {
            localStorage.setItem('notekeeper_notes', JSON.stringify(notesToSave));
        }

        function formatDate(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return 'Just now';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
            if (diff < 604800000) return `${Math.floor(diff / 86400000)}d ago`;
            
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        function extractTitle(content) {
            const firstLine = content.split('\n')[0].trim();
            return firstLine || 'Untitled';
        }

        // Render functions
        function renderNotesList() {
            notesList.innerHTML = '';
            
            if (notes.length === 0) {
                notesList.innerHTML = '<p class="text-sm text-slate-400 text-center py-8">No notes yet</p>';
                return;
            }

            notes.forEach(note => {
                const div = document.createElement('div');
                div.className = `note-item p-3 rounded-lg cursor-pointer border-l-4 border-transparent hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors ${note.id === currentNoteId ? 'active' : ''}`;
                div.innerHTML = `
                    <h3 class="font-medium text-sm truncate">${note.title}</h3>
                    <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">${formatDate(note.updatedAt)}</p>
                `;
                div.addEventListener('click', () => selectNote(note.id));
                notesList.appendChild(div);
            });
        }

        function renderEditor() {
            const note = notes.find(n => n.id === currentNoteId);
            
            if (!note) {
                editorHeader.classList.add('hidden');
                emptyState.classList.remove('hidden');
                noteContent.classList.add('hidden');
                return;
            }

            editorHeader.classList.remove('hidden');
            emptyState.classList.add('hidden');
            noteContent.classList.remove('hidden');
            
            noteTitle.textContent = note.title;
            noteDate.textContent = `Last edited ${formatDate(note.updatedAt)}`;
            noteContent.value = note.content;
        }

        // Actions
        function createNote() {
            const newNote = {
                id: Date.now().toString(),
                title: 'Untitled',
                content: '',
                updatedAt: Date.now()
            };
            
            notes.unshift(newNote);
            saveNotes(notes);
            selectNote(newNote.id);
            noteContent.focus();
        }

        function selectNote(id) {
            currentNoteId = id;
            renderNotesList();
            renderEditor();
        }

        function updateNote(content) {
            const noteIndex = notes.findIndex(n => n.id === currentNoteId);
            if (noteIndex === -1) return;

            const title = extractTitle(content);
            notes[noteIndex] = {
                ...notes[noteIndex],
                title,
                content,
                updatedAt: Date.now()
            };
            
            saveNotes(notes);
            renderNotesList();
            noteTitle.textContent = title;
            noteDate.textContent = `Last edited ${formatDate(notes[noteIndex].updatedAt)}`;
        }

        function showDeleteModal() {
            deleteModal.classList.remove('hidden');
        }

        function hideDeleteModal() {
            deleteModal.classList.add('hidden');
        }

        function deleteNote() {
            notes = notes.filter(n => n.id !== currentNoteId);
            saveNotes(notes);
            currentNoteId = null;
            hideDeleteModal();
            renderNotesList();
            renderEditor();
        }

        // Event Listeners
        newNoteBtn.addEventListener('click', createNote);
        deleteNoteBtn.addEventListener('click', showDeleteModal);
        cancelDeleteBtn.addEventListener('click', hideDeleteModal);
        confirmDeleteBtn.addEventListener('click', deleteNote);

        noteContent.addEventListener('input', (e) => {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                updateNote(e.target.value);
            }, 500);
        });

        // Dark mode toggle (optional)
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('notekeeper_theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        }

        // Initialize
        notes = getNotes().sort((a, b) => b.updatedAt - a.updatedAt);
        
        // Load theme preference
        if (localStorage.getItem('notekeeper_theme') === 'dark' || 
            (!localStorage.getItem('notekeeper_theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        renderNotesList();
        renderEditor();
    </script>
</body>
</html>
